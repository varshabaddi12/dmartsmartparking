<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#013061] flex items-center justify-center min-h-screen p-6">
    <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center">
        
        <div class="mb-10">
            <div class="inline-block bg-[#046D39] text-white px-5 py-2 rounded-2xl font-black text-2xl mb-4 shadow-md italic">D</div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Customer Login</h2>
            </div>

        {% if messages %}
            {% for message in messages %}
                <p class="text-red-500 text-[10px] mb-4 font-bold uppercase">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4 mb-8 text-left">
                <div>
                    <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Username</label>
                    <input type="text" name="username" required placeholder="Enter Username"
                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 text-xs outline-none focus:ring-2 focus:ring-[#046D39]">
                </div>

                <div>
                    <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Email Address</label>
                    <input type="email" name="email" required placeholder="customer@mail.com"
                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 text-xs outline-none focus:ring-2 focus:ring-[#046D39]">
                </div>

                <div>
                    <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 text-xs outline-none focus:ring-2 focus:ring-[#046D39]">
                </div>
            </div>

            <button type="submit" class="w-full bg-[#013061] text-white py-5 rounded-2xl font-black text-xs tracking-widest hover:bg-blue-900 transition-all shadow-lg uppercase">
                Login ➔
            </button>
        </form>
        
        <p class="mt-10 text-[9px] text-slate-300 font-bold uppercase tracking-widest">© 2026 DMart Parking</p>
    </div>
</body>
</html>
