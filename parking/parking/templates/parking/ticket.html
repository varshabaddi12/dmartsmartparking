<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DMart Parking Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-6">
    <div class="flex flex-col items-center gap-6 w-full max-w-xs">
        
        <div id="parking-ticket-area" class="bg-white w-full border-2 border-dashed border-slate-300 p-8 text-center rounded-[30px] shadow-sm">
            <div class="text-[#046D39] font-black text-3xl mb-1 italic tracking-tighter text-center">DMart</div>
            <div class="text-[9px] uppercase font-bold text-slate-400 tracking-[0.2em] mb-8 border-b border-slate-100 pb-4">Parking Entry Slip</div>
            
            <div class="space-y-5 text-left mb-8 px-2">
                <div class="flex justify-between border-b border-slate-50 pb-2">
                    <span class="text-slate-400 text-[9px] font-bold">NAME</span> 
                    <span class="text-[10px] font-black text-slate-800 uppercase">{{ booking.full_name }}</span>
                </div>
                <div class="flex justify-between border-b border-slate-50 pb-2">
                    <span class="text-slate-400 text-[9px] font-bold">VEHICLE</span> 
                    <span class="text-[11px] font-black text-slate-800 uppercase">{{ booking.vehicle_number }}</span>
                </div>
                <div class="flex justify-between border-b border-slate-50 pb-2">
                    <span class="text-slate-400 text-[9px] font-bold">SLOT NO</span> 
                    <span class="text-[11px] font-black text-blue-600 uppercase">{{ booking.slot_number }}</span>
                </div>
                <div class="flex justify-between pt-2">
                    <span class="text-slate-400 text-[9px] font-bold uppercase">Total to Pay</span> 
                    <span class="text-[13px] font-black text-slate-900 uppercase">₹{{ booking.total_amount }}</span>
                </div>
            </div>

            <div class="bg-slate-50 rounded-xl py-3 px-2">
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Keep this slip safely</p>
                <p class="text-[7px] text-slate-300 mt-1 uppercase">Please pay at the exit counter</p>
            </div>
        </div>

        <div class="w-full space-y-4">
            <button onclick="downloadTicketImage()" class="w-full bg-[#046D39] text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.1em] hover:scale-105 transition-all shadow-xl">
                Download Ticket 💾
            </button>
            
            <div class="flex justify-between items-center px-4 pt-2">
                <a href="{% url 'dashboard' %}" class="text-[9px] font-bold text-slate-400 hover:text-slate-600 uppercase underline">Dashboard</a>
                <a href="{% url 'welcome' %}" class="text-[9px] font-black text-red-500 hover:text-red-700 uppercase tracking-widest">Logout ➔</a>
            </div>
        </div>
    </div>

    <script>
        function downloadTicketImage() {
            const ticketElement = document.getElementById('parking-ticket-area');
            html2canvas(ticketElement, {
                scale: 3,
                backgroundColor: "#ffffff",
            }).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = image;
                link.download = 'DMart-Ticket-{{ booking.slot_number }}.png';
                link.click();
            });
        }
    </script>
</body>
</html>
